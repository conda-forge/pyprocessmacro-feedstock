{% set name = "pyprocessmacro" %}
{% set version = "1.0.13" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d46d3c05d8b82c0fe107da0d085ddd3c7a62ed9eb970f35fd222ff0760a95497

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.7
    - numpy
    - pandas
    - scipy
    - seaborn
    - matplotlib-base

  run:
    - matplotlib-base
    - {{ pin_compatible('numpy') }}
    - {{ pin_compatible('pandas') }}
    - python >=3.7
    - scipy
    - seaborn

test:
  imports:
    - pyprocessmacro

about:
  home: https://github.com/QuentinAndre/pyprocessmacro/
  summary: A Python library for moderation, mediation and conditional process analysis. Based on Andrew F. Hayes Process Macro.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - QuentinAndre
